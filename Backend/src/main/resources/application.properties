spring.application.name=galle-hospital

spring.datasource.url=jdbc:mysql://localhost:3306/gallehospital?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password= 2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


server.port=5000

app.password-reset.token-expiration-minutes=15
app.frontend.reset-password-url=http://localhost:3000/reset-password

# Configure these values with your real SMTP account before sending emails.
# Example for Gmail: use an app password, not your normal account password.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
